<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SetConCA Mastery — Interactive Research Curriculum</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0f1117;
      --surface: #171b26;
      --surface2: #1e2433;
      --border: #2a3144;
      --text: #e8ecf4;
      --muted: #8b95a8;
      --accent: #6c9eff;
      --accent2: #7ee787;
      --warn: #f0b060;
      --danger: #f07178;
      --radius: 10px;
      --font: 'IBM Plex Sans', system-ui, sans-serif;
      --mono: 'IBM Plex Mono', monospace;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: var(--font); background: var(--bg); color: var(--text); line-height: 1.55; min-height: 100vh; }
    a { color: var(--accent); text-decoration: none; }
    a:hover { text-decoration: underline; }
    button { font-family: inherit; cursor: pointer; border: none; border-radius: 8px; padding: 0.55rem 1rem; font-weight: 500; transition: 0.15s; }
    .btn-primary { background: var(--accent); color: #0a0e18; }
    .btn-primary:hover { filter: brightness(1.1); }
    .btn-secondary { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }
    .btn-secondary:hover { border-color: var(--accent); }
    .btn-ghost { background: transparent; color: var(--muted); border: 1px solid var(--border); }
    .layout { display: grid; grid-template-columns: 280px 1fr; min-height: 100vh; }
    .sidebar { background: var(--surface); border-right: 1px solid var(--border); padding: 1.25rem; overflow-y: auto; position: sticky; top: 0; height: 100vh; }
    .sidebar h1 { font-size: 1.05rem; font-weight: 700; margin-bottom: 0.25rem; }
    .sidebar .sub { font-size: 0.78rem; color: var(--muted); margin-bottom: 1rem; line-height: 1.4; }
    .progress-wrap { margin: 1rem 0; }
    .progress-bar { height: 6px; background: var(--surface2); border-radius: 99px; overflow: hidden; }
    .progress-fill { height: 100%; background: linear-gradient(90deg, var(--accent), var(--accent2)); transition: width 0.4s; }
    .progress-label { font-size: 0.75rem; color: var(--muted); margin-top: 0.35rem; }
    .level-nav { list-style: none; }
    .level-nav li { margin-bottom: 0.35rem; }
    .level-nav button { width: 100%; text-align: left; background: transparent; color: var(--muted); padding: 0.5rem 0.65rem; border-radius: 8px; font-size: 0.82rem; display: flex; align-items: center; gap: 0.5rem; border: 1px solid transparent; }
    .level-nav button.active { background: var(--surface2); color: var(--text); border-color: var(--border); }
    .level-nav button.done .dot { background: var(--accent2); }
    .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--border); flex-shrink: 0; }
    main { padding: 1.5rem 2rem 3rem; max-width: 960px; }
    .hero { margin-bottom: 2rem; }
    .hero h2 { font-size: 1.75rem; font-weight: 700; margin-bottom: 0.5rem; }
    .hero p { color: var(--muted); max-width: 60ch; }
    .formula { font-family: var(--mono); font-size: 0.85rem; background: var(--surface2); border: 1px solid var(--border); padding: 0.75rem 1rem; border-radius: var(--radius); margin-top: 1rem; color: var(--accent2); }
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 1.25rem; margin-bottom: 1rem; }
    .card h3 { font-size: 1rem; margin-bottom: 0.75rem; }
    .badge { display: inline-block; font-size: 0.68rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.04em; padding: 0.15rem 0.45rem; border-radius: 4px; background: var(--surface2); color: var(--muted); margin-right: 0.35rem; }
    .badge.accent { background: rgba(108,158,255,0.15); color: var(--accent); }
    .badge.done { background: rgba(126,231,135,0.15); color: var(--accent2); }
    .paper-list { display: flex; flex-direction: column; gap: 0.5rem; }
    .paper-item { display: flex; align-items: center; justify-content: space-between; padding: 0.75rem 1rem; background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; cursor: pointer; transition: 0.15s; }
    .paper-item:hover, .paper-item.active { border-color: var(--accent); }
    .paper-item .num { font-family: var(--mono); color: var(--muted); font-size: 0.8rem; min-width: 2rem; }
    .paper-item .title { flex: 1; font-size: 0.9rem; }
    .paper-item .status { font-size: 0.75rem; color: var(--muted); }
    .pass-tabs { display: flex; gap: 0.5rem; margin-bottom: 1.25rem; flex-wrap: wrap; }
    .pass-tab { padding: 0.45rem 0.9rem; border-radius: 99px; font-size: 0.82rem; background: var(--surface2); color: var(--muted); border: 1px solid var(--border); }
    .pass-tab.active { background: rgba(108,158,255,0.15); color: var(--accent); border-color: var(--accent); }
    .learn-list { list-style: none; margin: 0.75rem 0; }
    .learn-list li { padding: 0.35rem 0 0.35rem 1.25rem; position: relative; font-size: 0.9rem; }
    .learn-list li::before { content: '→'; position: absolute; left: 0; color: var(--accent); }
    .callout { border-left: 3px solid var(--accent); padding: 0.75rem 1rem; background: rgba(108,158,255,0.06); border-radius: 0 8px 8px 0; margin: 1rem 0; font-size: 0.88rem; }
    .callout.warn { border-color: var(--warn); background: rgba(240,176,96,0.06); }
    .callout.setconca { border-color: var(--accent2); background: rgba(126,231,135,0.06); }
    .media-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin: 1rem 0; }
    @media (max-width: 800px) { .media-grid { grid-template-columns: 1fr; } .layout { grid-template-columns: 1fr; } .sidebar { position: relative; height: auto; } }
    .demo-canvas { width: 100%; background: #0a0e14; border: 1px solid var(--border); border-radius: 8px; display: block; }
    .demo-controls { display: flex; gap: 0.5rem; flex-wrap: wrap; margin-top: 0.5rem; align-items: center; }
    .demo-controls label { font-size: 0.8rem; color: var(--muted); }
    .demo-controls input[type=range] { width: 120px; accent-color: var(--accent); }
    .quiz { margin-top: 1rem; }
    .quiz-q { font-weight: 500; margin-bottom: 0.75rem; }
    .quiz-opt { display: block; width: 100%; text-align: left; padding: 0.6rem 0.85rem; margin-bottom: 0.4rem; background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-size: 0.88rem; }
    .quiz-opt:hover { border-color: var(--accent); }
    .quiz-opt.correct { border-color: var(--accent2); background: rgba(126,231,135,0.1); }
    .quiz-opt.wrong { border-color: var(--danger); background: rgba(240,113,120,0.1); }
    .quiz-feedback { font-size: 0.85rem; margin-top: 0.5rem; padding: 0.65rem; border-radius: 8px; }
    .table-wrap { overflow-x: auto; margin: 1rem 0; }
    table { width: 100%; border-collapse: collapse; font-size: 0.82rem; }
    th, td { padding: 0.55rem 0.75rem; border: 1px solid var(--border); text-align: left; }
    th { background: var(--surface2); color: var(--muted); font-weight: 600; }
    .actions { display: flex; gap: 0.5rem; flex-wrap: wrap; margin-top: 1.25rem; }
    .research-prompts { display: grid; gap: 0.75rem; margin-top: 0.75rem; }
    .research-prompts textarea { width: 100%; min-height: 70px; background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; color: var(--text); padding: 0.65rem; font-family: var(--font); font-size: 0.85rem; resize: vertical; }
    .hidden { display: none !important; }
    .schedule-row { display: grid; grid-template-columns: 4rem 1fr 1fr; gap: 0.75rem; padding: 0.5rem 0; border-bottom: 1px solid var(--border); font-size: 0.85rem; }
    .video-wrap { position: relative; padding-bottom: 56.25%; height: 0; overflow: hidden; border-radius: 8px; border: 1px solid var(--border); margin-top: 0.5rem; }
    .video-wrap iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: 0; }
    .three-col-compare { display: grid; grid-template-columns: repeat(3,1fr); gap: 0.75rem; text-align: center; font-size: 0.82rem; }
    .three-col-compare div { background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: 0.75rem; }
    .three-col-compare strong { display: block; color: var(--accent); margin-bottom: 0.35rem; }
  </style>
</head>
<body>
  <div class="layout">
    <aside class="sidebar">
      <h1>SetConCA Mastery</h1>
      <p class="sub">10 levels · 43 papers · 3-pass learning · interactive demos</p>
      <div class="progress-wrap">
        <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
        <div class="progress-label" id="progressLabel">0 / 43 papers started</div>
      </div>
      <ul class="level-nav" id="levelNav"></ul>
      <div style="margin-top:1.5rem">
        <button class="btn-ghost" style="width:100%;font-size:0.8rem" onclick="resetProgress()">Reset progress</button>
      </div>
    </aside>
    <main id="mainContent"></main>
  </div>
  <script src="papers.js"></script>
  <script>
    const STORAGE_KEY = 'setconca-mastery-v1';
    let state = loadState();
    let currentLevel = state.currentLevel || 1;
    let currentPaperId = state.currentPaperId || null;
    let currentPass = state.currentPass || 'concept';

    function loadState() {
      try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || defaultState(); }
      catch { return defaultState(); }
    }
    function defaultState() {
      return { currentLevel: 1, currentPaperId: null, currentPass: 'concept', papers: {}, notes: {} };
    }
    function saveState() { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); updateProgress(); renderSidebar(); }
    function resetProgress() { if (confirm('Clear all progress and notes?')) { state = defaultState(); saveState(); render(); } }

    function allPapers() {
      return CURRICULUM_DATA.levels.flatMap(l => l.papers);
    }
    function getPaper(id) { return allPapers().find(p => p.id === id); }
    function getLevel(id) { return CURRICULUM_DATA.levels.find(l => l.id === id); }

    function paperProgress(id) {
      const p = state.papers[id] || {};
      const passes = ['concept','technical','research'];
      const done = passes.filter(x => p[x]).length;
      return { done, total: 3, complete: done === 3 };
    }

    function updateProgress() {
      const papers = allPapers();
      const started = papers.filter(p => paperProgress(p.id).done > 0).length;
      const complete = papers.filter(p => paperProgress(p.id).complete).length;
      document.getElementById('progressFill').style.width = (complete / papers.length * 100) + '%';
      document.getElementById('progressLabel').textContent = `${complete} complete · ${started} started · ${papers.length} total`;
    }

    function renderSidebar() {
      const nav = document.getElementById('levelNav');
      nav.innerHTML = CURRICULUM_DATA.levels.map(l => {
        const papers = l.papers.filter(p => !p.optional);
        const done = papers.every(p => paperProgress(p.id).complete);
        return `<li><button class="${l.id === currentLevel ? 'active' : ''} ${done ? 'done' : ''}" onclick="goLevel(${l.id})"><span class="dot"></span>L${l.id}: ${l.title}</button></li>`;
      }).join('');
    }

    function goLevel(id) { currentLevel = id; currentPaperId = null; saveState(); render(); }
    function goPaper(id) { currentPaperId = id; currentPass = 'concept'; state.currentLevel = currentLevel; state.currentPaperId = id; saveState(); render(); }
    function goBack() { currentPaperId = null; state.currentPaperId = null; saveState(); render(); }
    function setPass(p) { currentPass = p; state.currentPass = p; saveState(); renderPaperView(); }
    function markPassDone() {
      if (!currentPaperId) return;
      state.papers[currentPaperId] = state.papers[currentPaperId] || {};
      state.papers[currentPaperId][currentPass] = true;
      saveState();
      renderPaperView();
    }

    function render() {
      renderSidebar();
      updateProgress();
      if (currentPaperId) renderPaperView();
      else renderLevelView();
    }

    function renderLevelView() {
      const level = getLevel(currentLevel);
      const main = document.getElementById('mainContent');
      main.innerHTML = `
        <div class="hero">
          <span class="badge accent">Level ${level.id}</span>
          <span class="badge">Weeks ${level.weeks}</span>
          <h2>${level.title}</h2>
          ${level.central_question ? `<p style="margin-top:0.75rem;font-style:italic;color:var(--warn)">${level.central_question}</p>` : ''}
          ${level.key_lesson ? `<div class="callout warn">${level.key_lesson}</div>` : ''}
        </div>
        ${level.id === 1 ? renderCompareBox() : ''}
        ${level.id === 6 ? renderMetricTable() : ''}
        ${level.checkpoint ? `<div class="card"><h3>🧪 Practical checkpoint</h3><p>${level.checkpoint}</p></div>` : ''}
        ${level.questions ? `<div class="card"><h3>Questions you should answer</h3><ul class="learn-list">${level.questions.map(q=>`<li>${q}</li>`).join('')}</ul></div>` : ''}
        <div class="card">
          <h3>Papers in this level</h3>
          <div class="paper-list">
            ${level.papers.map(p => {
              const prog = paperProgress(p.id);
              return `<div class="paper-item" onclick="goPaper('${p.id}')">
                <span class="num">${p.num ?? '·'}</span>
                <span class="title">${p.title}${p.optional ? ' <span class="badge">optional</span>' : ''}${p.missing_local ? ' <span class="badge" style="color:var(--warn)">web only</span>' : ''}</span>
                <span class="status">${prog.complete ? '✓ done' : prog.done ? `${prog.done}/3` : 'start →'}</span>
              </div>`;
            }).join('')}
          </div>
        </div>
        ${currentLevel === 1 ? renderSchedule() : ''}
      `;
    }

    function renderCompareBox() {
      return `<div class="card"><h3>PCA vs ICA vs CCA</h3>
        <div class="three-col-compare">
          <div><strong>PCA</strong>Preserve variance within one view</div>
          <div><strong>ICA</strong>Recover statistically independent sources</div>
          <div><strong>CCA</strong>Recover correlated info across two views</div>
        </div></div>`;
    }

    function renderMetricTable() {
      const rows = CURRICULUM_DATA.metricTable.map(r => `<tr><td>${r[0]}</td><td>${r[1]}</td><td>${r[2]}</td></tr>`).join('');
      return `<div class="card"><h3>What each test establishes (and does not)</h3>
        <div class="table-wrap"><table><thead><tr><th>Test</th><th>Supports</th><th>Does NOT establish</th></tr></thead><tbody>${rows}</tbody></table></div>
        <p style="font-size:0.85rem;color:var(--muted);margin-top:0.5rem">A strong paper needs several complementary tests — no single metric measures interpretability.</p></div>`;
    }

    function renderSchedule() {
      return `<div class="card"><h3>16-week schedule</h3>
        ${CURRICULUM_DATA.schedule16Weeks.map(s => `<div class="schedule-row"><span>${s.weeks}</span><span>${s.topic}</span><span style="color:var(--muted)">${s.output}</span></div>`).join('')}
        <div class="formula" style="margin-top:1rem">${CURRICULUM_DATA.formula}</div></div>`;
    }

    function renderPaperView() {
      const paper = getPaper(currentPaperId);
      const level = CURRICULUM_DATA.levels.find(l => l.papers.some(p => p.id === paper.id));
      const prog = paperProgress(paper.id);
      const main = document.getElementById('mainContent');
      main.innerHTML = `
        <div style="margin-bottom:1rem"><button class="btn-ghost" id="backBtn" onclick="goBack()">← Back to Level ${level.id}</button></div>
        <div class="hero">
          ${paper.num ? `<span class="badge accent">Paper ${paper.num}</span>` : '<span class="badge">Optional</span>'}
          <span class="badge">${prog.done}/3 passes</span>
          <h2>${paper.title}</h2>
          <p>${paper.authors}${paper.pages ? ` · ${paper.pages} pages` : ''}</p>
        </div>
        <div class="pass-tabs">
          ${['concept','technical','research'].map(p => `<button class="pass-tab ${currentPass===p?'active':''} ${state.papers[paper.id]?.[p]?'done':''}" onclick="setPass('${p}')">${p.charAt(0).toUpperCase()+p.slice(1)} pass ${state.papers[paper.id]?.[p]?'✓':''}</button>`).join('')}
        </div>
        <div id="passContent"></div>
        <div class="actions">
          ${paper.pdfPath ? `<a href="${paper.pdfPath}" target="_blank"><button class="btn-secondary">📄 Open local PDF</button></a>` : ''}
          ${paper.url ? `<a href="${paper.url}" target="_blank"><button class="btn-secondary">🌐 Open online</button></a>` : ''}
          <button class="btn-secondary" onclick="speakSummary()">🔊 Listen to summary</button>
          <button class="btn-primary" onclick="markPassDone()">Mark ${currentPass} pass complete</button>
        </div>
      `;
      renderPassContent(paper);
    }

    function renderPassContent(paper) {
      const el = document.getElementById('passContent');
      const rich = paper.richContent ? renderRichPaperContent(paper, currentPass) : '';
      if (currentPass === 'concept') {
        el.innerHTML = rich + `
          <div class="card">
            <h3>Concept pass — Big picture</h3>
            <p style="margin-bottom:0.75rem;color:var(--muted);font-size:0.88rem">Read: abstract, figures, introduction, conclusion.</p>
            ${paper.richContent?.abstract ? `<p>${paper.richContent.abstract}</p>` : paper.abstract ? `<p>${paper.abstract}</p>` : '<p class="callout warn">Open the PDF and read the abstract and introduction.</p>'}
            ${paper.richContent?.keyResults ? `<h4 style="margin:1rem 0 0.5rem;font-size:0.9rem">Key results from the paper</h4><ul class="learn-list">${paper.richContent.keyResults.map(r=>`<li>${r}</li>`).join('')}</ul>` : ''}
            <h4 style="margin:1rem 0 0.5rem;font-size:0.9rem">What you'll learn</h4>
            <ul class="learn-list">${paper.learn.map(l=>`<li>${l}</li>`).join('')}</ul>
            <div class="callout setconca"><strong>SetConCA connection:</strong> ${paper.setconca}</div>
          </div>
          ${renderDemoForPaper(paper.id)}
          ${paper.video ? `<div class="card"><h3>📺 Supplementary video</h3><div class="video-wrap"><iframe src="${paper.video.replace('watch?v=','embed/')}" allowfullscreen></iframe></div></div>` : ''}
          ${paper.quiz ? renderQuiz(paper) : ''}
        `;
      } else if (currentPass === 'technical') {
        el.innerHTML = rich + `
          <div class="card">
            <h3>Technical pass — Method & evaluation</h3>
            <p style="color:var(--muted);font-size:0.88rem;margin-bottom:1rem">Focus: objective function, assumptions, architecture, baselines, ablations, limitations.</p>
            <ul class="learn-list">${paper.learn.map(l=>`<li><strong>Deep dive:</strong> ${l}</li>`).join('')}</ul>
            ${getTechnicalNotes(paper.id)}
          </div>
          ${renderDemoForPaper(paper.id, true)}
        `;
      } else {
        el.innerHTML = rich + `
          <div class="card">
            <h3>Research pass — Challenge, reproduce, apply</h3>
            <p style="color:var(--muted);font-size:0.88rem;margin-bottom:1rem">Identify one assumption to challenge, one experiment to reproduce, one idea for SetConCA.</p>
            ${paper.richContent?.openQuestions ? `<div class="callout warn"><strong>Open questions from the paper:</strong><ul class="learn-list">${paper.richContent.openQuestions.map(q=>`<li>${q}</li>`).join('')}</ul></div>` : ''}
            ${paper.richContent?.setconcaLinks ? `<div class="callout setconca"><strong>SetConCA research links:</strong><ul class="learn-list">${paper.richContent.setconcaLinks.map(l=>`<li>${l}</li>`).join('')}</ul></div>` : ''}
            <div class="research-prompts">
              <label><strong>Assumption to challenge</strong></label>
              <textarea id="noteChallenge" placeholder="What does this paper assume that might not hold for multi-view SAE codes?" onchange="saveNote('challenge')">${state.notes[paper.id]?.challenge||''}</textarea>
              <label><strong>Experiment to reproduce</strong></label>
              <textarea id="noteReproduce" placeholder="Minimum viable replication on Gemma activations..." onchange="saveNote('reproduce')">${state.notes[paper.id]?.reproduce||''}</textarea>
              <label><strong>Idea for SetConCA</strong></label>
              <textarea id="noteApply" placeholder="How does this change your method or evaluation?" onchange="saveNote('apply')">${state.notes[paper.id]?.apply||''}</textarea>
            </div>
            <div class="callout setconca">${paper.setconca}</div>
          </div>
        `;
      }
    }

    function renderRichPaperContent(paper, pass) {
      const r = paper.richContent;
      if (!r || paper.id !== 'superposition') return '';
      let html = '';
      if (pass === 'concept') {
        html += `<div class="card"><h3>Representation hierarchy (from paper)</h3>
          <div class="table-wrap"><table><thead><tr><th>Property</th><th>Meaning</th></tr></thead><tbody>
          ${r.hierarchy.map(h=>`<tr><td><strong>${h.level}</strong></td><td>${h.desc}</td></tr>`).join('')}
          </tbody></table></div></div>`;
        html += `<div class="card"><h3>Competing forces</h3><div class="three-col-compare">
          ${r.forces.map(f=>`<div><strong>${f.name}</strong>${f.desc}</div>`).join('')}
          </div></div>`;
      }
      if (pass === 'concept' || pass === 'technical') {
        html += `<div class="card"><h3>Toy model architectures</h3>
          ${r.models.map(m=>`<div style="margin-bottom:1rem;padding-bottom:1rem;border-bottom:1px solid var(--border)">
            <strong>${m.name}</strong><div class="formula" style="margin:0.5rem 0;font-size:0.8rem">${m.eq}</div><p style="font-size:0.88rem;color:var(--muted)">${m.behavior}</p></div>`).join('')}
          <p style="font-size:0.85rem"><strong>Loss:</strong> <span class="formula" style="display:inline;padding:0.2rem 0.5rem">${r.loss}</span></p>
          <h4 style="margin:1rem 0 0.5rem">Synthetic data assumptions</h4>
          <ul class="learn-list">${r.syntheticData.map(s=>`<li>${s}</li>`).join('')}</ul>
          </div>`;
        html += `<div class="card"><h3>📊 Phase diagram — when does superposition win?</h3>
          <p style="font-size:0.85rem;color:var(--muted);margin-bottom:0.75rem">${r.phaseDiagram.description}</p>
          <canvas class="demo-canvas" id="phaseDiagram" width="480" height="300"></canvas>
          <div class="demo-controls"><label>Sparsity S: <input type="range" id="phaseSparsity" min="1" max="99" value="85"></label>
          <label>Extra feature importance: <input type="range" id="phaseImportance" min="1" max="100" value="50"></label></div>
          <p id="phaseOutcome" style="font-size:0.88rem;margin-top:0.5rem"></p></div>`;
        html += `<div class="card"><h3>📊 Feature dimensionality — sticky geometric points</h3>
          <p style="font-size:0.85rem;color:var(--muted)">${r.featureDimensionality.interpretation}</p>
          <div class="formula" style="margin:0.75rem 0">${r.featureDimensionality.formula}</div>
          <canvas class="demo-canvas" id="dimChart" width="480" height="260"></canvas>
          <div class="demo-controls"><label>Sparsity (1−S): <input type="range" id="dimSparsity" min="1" max="99" value="60"></label></div>

    function demoPCA(mount) {
      mount.innerHTML = `<canvas class="demo-canvas" id="pcaCanvas" width="440" height="280"></canvas>
        <div class="demo-controls"><label>Components: <input type="range" id="pcaK" min="1" max="2" value="1"></label>
        <button class="btn-secondary" onclick="runPCA()">Recompute PCA</button></div>
        <p style="font-size:0.8rem;color:var(--muted);margin-top:0.5rem">Drag points. Watch reconstruction error grow when you drop components.</p>`;
      const canvas = document.getElementById('pcaCanvas');
      const ctx = canvas.getContext('2d');
      let pts = Array.from({length:12}, (_,i) => ({x: 80+Math.random()*280, y: 40+Math.random()*200, ox:0, oy:0}));
      let drag = null;
      canvas.onmousedown = e => { const r=canvas.getBoundingClientRect(); const x=e.clientX-r.left,y=e.clientY-r.top; drag=pts.find(p=>Math.hypot(p.x-x,p.y-y)<10); };
      canvas.onmousemove = e => { if(!drag)return; const r=canvas.getBoundingClientRect(); drag.x=e.clientX-r.left; drag.y=e.clientY-r.top; drawPCA(); };
      canvas.onmouseup = () => drag=null;
      function drawPCA() {
        const k = +document.getElementById('pcaK').value;
        ctx.fillStyle='#0a0e14'; ctx.fillRect(0,0,440,280);
        const mx=pts.reduce((s,p)=>s+p.x,0)/pts.length, my=pts.reduce((s,p)=>s+p.y,0)/pts.length;
        let cxx=0,cyy=0,cxy=0;
        pts.forEach(p=>{ const dx=p.x-mx, dy=p.y-my; cxx+=dx*dx; cyy+=dy*dy; cxy+=dx*dy; });
        cxx/=pts.length; cyy/=pts.length; cxy/=pts.length;
        const tr=cxx+cyy, det=cxx*cyy-cxy*cxy;
        const l1=(tr+Math.sqrt(tr*tr-4*det))/2;
        let vx=cxy, vy=l1-cxx; const n=Math.hypot(vx,vy)||1; vx/=n; vy/=n;
        ctx.strokeStyle='#6c9eff'; ctx.lineWidth=2;
        ctx.beginPath(); ctx.moveTo(mx-80*vx,my-80*vy); ctx.lineTo(mx+80*vx,my+80*vy); ctx.stroke();
        pts.forEach(p=>{
          let rx=p.x, ry=p.y;
          if(k===1){ const dx=p.x-mx, dy=p.y-my; const proj=dx*vx+dy*vy; rx=mx+proj*vx; ry=my+proj*vy; }
          ctx.fillStyle='#7ee787'; ctx.beginPath(); ctx.arc(p.x,p.y,5,0,7); ctx.fill();
          ctx.strokeStyle='#f07178'; ctx.beginPath(); ctx.moveTo(p.x,p.y); ctx.lineTo(rx,ry); ctx.stroke();
          ctx.fillStyle='#6c9eff'; ctx.beginPath(); ctx.arc(rx,ry,4,0,7); ctx.fill();
        });
        ctx.fillStyle='#8b95a8'; ctx.font='12px IBM Plex Mono'; ctx.fillText(`PC1 explains major variance axis (k=${k})`, 12, 20);
      }
      window.runPCA = drawPCA;
      document.getElementById('pcaK').oninput = drawPCA;
      drawPCA();
    }

    function drawPhaseDiagram() {
      const c = document.getElementById('phaseDiagram');
      if (!c) return;
      const ctx = c.getContext('2d');
      const S = +document.getElementById('phaseSparsity').value / 100;
      const imp = +document.getElementById('phaseImportance').value / 100;
      const density = 1 - S;
      ctx.fillStyle='#0a0e14'; ctx.fillRect(0,0,480,300);
      // Axes: x = sparsity (1-S), y = relative importance of extra feature
      ctx.strokeStyle='#2a3144'; ctx.lineWidth=1;
      ctx.beginPath(); ctx.moveTo(50,250); ctx.lineTo(450,250); ctx.lineTo(450,30); ctx.stroke();
      ctx.fillStyle='#8b95a8'; ctx.font='11px IBM Plex Mono';
      ctx.fillText('Activation density (1−S) →', 180, 285);
      ctx.save(); ctx.translate(18,160); ctx.rotate(-Math.PI/2); ctx.fillText('Extra feature importance →', 0,0); ctx.restore();
      // Phase regions (simplified from paper's 2-in-1 experiment)
      for(let x=0;x<400;x++){
        for(let y=0;y<220;y++){
          const d = x/400, im = 0.1 + (y/220)*9.9;
          let phase;
          if (d < 0.15) phase = im > 1.5 ? '#7ee78744' : '#8b95a844';
          else if (d < 0.35 + im*0.05) phase = '#f0b06044';
          else phase = im > 0.8 ? '#7ee78744' : '#f0b06044';
          if (d > 0.5 && im < 1.2) phase = '#f0b06066';
          if (d > 0.65) phase = '#7ee78766';
          ctx.fillStyle=phase; ctx.fillRect(50+x, 30+y, 1, 1);
        }
      }
      const px = 50 + density*400, py = 250 - imp*220;
      ctx.fillStyle='#fff'; ctx.beginPath(); ctx.arc(px,py,8,0,7); ctx.fill();
      ctx.strokeStyle='#6c9eff'; ctx.lineWidth=2; ctx.stroke();
      let outcome = 'Superposition (antipodal pair W=[1,−1])';
      if (density < 0.12) outcome = imp > 1.2 ? 'Dedicated dimension for extra feature' : 'Extra feature not learned';
      else if (density > 0.55 && imp > 0.6) outcome = 'Dedicated dimension — dense enough for orthogonal storage';
      else if (density > 0.3) outcome = 'Superposition — tolerates interference because features are sparse';
      document.getElementById('phaseOutcome').innerHTML = `<strong>Current point:</strong> density=${(density*100).toFixed(0)}%, importance=${(imp*10).toFixed(1)} → <span style="color:var(--accent2)">${outcome}</span>`;
      ctx.fillStyle='#f0b060'; ctx.fillRect(60,40,12,12); ctx.fillStyle='#8b95a8'; ctx.fillText('Not learned', 78, 50);
      ctx.fillStyle='#f0b060'; ctx.fillRect(160,40,12,12); ctx.fillText('Superposition', 178, 50);
      ctx.fillStyle='#7ee787'; ctx.fillRect(280,40,12,12); ctx.fillText('Dedicated dim', 298, 50);
    }

      ctx.fillStyle='#0a0e14'; ctx.fillRect(0,0,480,260);
      ctx.strokeStyle='#2a3144';
      ctx.beginPath(); ctx.moveTo(40,220); ctx.lineTo(460,220); ctx.stroke();
      sticky.forEach(s=>{
        const y = 220 - s.d * 180;
        ctx.strokeStyle=s.c; ctx.setLineDash([4,4]); ctx.lineWidth=1;
        ctx.beginPath(); ctx.moveTo(40,y); ctx.lineTo(460,y); ctx.stroke();
        ctx.setLineDash([]); ctx.fillStyle=s.c; ctx.font='10px IBM Plex Mono';
        ctx.fillText(s.l, 42, y-3);
      });
      // Simulated feature points clustering at sticky values as sparsity increases
      const nPts = 30;
      for(let i=0;i<nPts;i++){
        const x = 40 + (i/nPts)*420;
        const t = density * (0.5 + 0.5*Math.sin(i*0.7));
        let d = t < 0.15 ? 0 : t < 0.25 ? 0.5 : t < 0.4 ? 0.667 : t < 0.55 ? 0.75 : t < 0.7 ? 0.5 : 1.0;
        d += (Math.random()-0.5)*0.04;
        const y = 220 - d * 180;
        ctx.fillStyle='rgba(108,158,255,0.7)'; ctx.beginPath(); ctx.arc(x,y,3,0,7); ctx.fill();
      }
      ctx.fillStyle='#8b95a8'; ctx.font='11px IBM Plex Mono';
      ctx.fillText('D_i (feature dimensionality)', 160, 250);
      ctx.fillText(`Activation density = ${(density*100).toFixed(0)}% — sticky points from paper Fig (uniform superposition)`, 40, 18);
    }

    function drawFiveTwoDemo() {
      const c = document.getElementById('fiveTwoDemo');
      if (!c) return;
      const ctx = c.getContext('2d');
      const density = +document.getElementById('fiveSparsity').value / 100;
      const cx=140, cy=140, cx2=340;
      const importances = [1, 0.7, 0.49, 0.34, 0.24];
      const colors = ['#7ee787','#6c9eff','#f0b060','#f07178','#a78bfa'];
      ctx.fillStyle='#0a0e14'; ctx.fillRect(0,0,480,280);
      ctx.fillStyle='#8b95a8'; ctx.font='11px IBM Plex Mono';
      ctx.fillText('Linear / dense: top-2 PCA', 60, 25);
      ctx.fillText(`ReLU + sparsity (density=${(density*100).toFixed(0)}%)`, 260, 25);
      // Left: PCA - only top 2
      ctx.strokeStyle='#2a3144'; ctx.beginPath(); ctx.moveTo(cx-60,cy); ctx.lineTo(cx+60,cy); ctx.moveTo(cx,cy-60); ctx.lineTo(cx,cy+60); ctx.stroke();
      for(let i=0;i<5;i++){
        const angle = i/5*Math.PI*2;
        const r = importances[i] > 0.45 ? 50 : 0;
        if(r>0){ ctx.fillStyle=colors[i]; ctx.beginPath(); ctx.arc(cx+Math.cos(angle)*r,cy+Math.sin(angle)*r,6,0,7); ctx.fill(); }
        else { ctx.fillStyle='#8b95a8'; ctx.font='9px IBM Plex Mono'; ctx.fillText('×', cx+Math.cos(angle)*35-3, cy+Math.sin(angle)*35+3); }
      }
      // Right: superposition - more features as density drops
      ctx.strokeStyle='#2a3144'; ctx.beginPath(); ctx.moveTo(cx2-60,cy); ctx.lineTo(cx2+60,cy); ctx.moveTo(cx2,cy-60); ctx.lineTo(cx2,cy+60); ctx.stroke();
      const nRep = density < 0.2 ? 5 : density < 0.4 ? 4 : density < 0.6 ? 3 : 2;
      for(let i=0;i<5;i++){
        const angle = i/5*Math.PI*2 - Math.PI/2;
        const rep = i < nRep;
        if(rep){
          const r = rep ? (i<2 ? 50 : 35) : 0;
          ctx.strokeStyle=colors[i]; ctx.lineWidth=2;
          ctx.beginPath(); ctx.moveTo(cx2,cy); ctx.lineTo(cx2+Math.cos(angle)*r,cy+Math.sin(angle)*r*0.8); ctx.stroke();
          ctx.fillStyle=colors[i]; ctx.beginPath(); ctx.arc(cx2+Math.cos(angle)*r,cy+Math.sin(angle)*r*0.8,5,0,7); ctx.fill();
        } else {
          ctx.fillStyle='#8b95a8'; ctx.fillText('×', cx2+Math.cos(angle)*20-3, cy+Math.sin(angle)*20+3);
        }
      }
      ctx.fillStyle='#8b95a8'; ctx.font='10px IBM Plex Mono';
      ctx.fillText(`${nRep}/5 features represented`, 300, 260);
    }

    window.setGeometry = function(type) { drawGeometryGraph(type); };

    function drawGeometryGraph(type) {
      const c = document.getElementById('geometryGraph');
      if (!c) return;
      const ctx = c.getContext('2d');
      const cx=240, cy=140, R=90;
      ctx.fillStyle='#0a0e14'; ctx.fillRect(0,0,480,280);
      let pts = [], edges = [];
      if(type==='pentagon'){
        for(let i=0;i<5;i++){ const a=i/5*Math.PI*2-Math.PI/2; pts.push([cx+Math.cos(a)*R,cy+Math.sin(a)*R]); }
        edges = [[0,1],[1,2],[2,3],[3,4],[4,0],[0,2],[1,3]];
      } else if(type==='triangle'){
        for(let i=0;i<3;i++){ const a=i/3*Math.PI*2-Math.PI/2; pts.push([cx+Math.cos(a)*R,cy+Math.sin(a)*R]); }
        edges = [[0,1],[1,2],[2,0]];
      } else if(type==='antipodal'){
        pts=[[cx-R,cy],[cx+R,cy],[cx,cy-R],[cx,cy+R]];
        edges=[[0,1],[2,3]];
      } else {
        pts=[[cx,cy-70],[cx-60,cy+40],[cx+60,cy+40],[cx,cy+10]];
        edges=[[0,1],[0,2],[0,3],[1,2],[1,3],[2,3]];
      }
      edges.forEach(([a,b])=>{
        const w = Math.abs(Math.cos((a-b)*0.5));
        ctx.strokeStyle=`rgba(126,231,135,${0.2+w*0.5})`; ctx.lineWidth=1+w;
        ctx.beginPath(); ctx.moveTo(pts[a][0],pts[a][1]); ctx.lineTo(pts[b][0],pts[b][1]); ctx.stroke();
      });
      pts.forEach((p,i)=>{
        ctx.fillStyle=`hsl(${i*60},70%,60%)`; ctx.beginPath(); ctx.arc(p[0],p[1],8,0,7); ctx.fill();
        ctx.fillStyle='#8b95a8'; ctx.font='10px IBM Plex Mono'; ctx.fillText('f'+i, p[0]-8, p[1]-12);
      });
      const labels = {pentagon:'Pentagon (D=⅖) — 5 features in 2D',triangle:'Triangle (D=⅔)',antipodal:'Antipodal digons (D=½ each)',tetra:'Tetrahedron projection (D=¾)'};
      ctx.fillStyle='#8b95a8'; ctx.font='12px IBM Plex Mono'; ctx.fillText(labels[type]||type, 12, 20);
      ctx.fillText('Edges = feature interference (|dot product|)', 12, 265);
    }

    // Hook demos after render
    const origRenderPass = renderPassContent;
    renderPassContent = function(paper) {
      origRenderPass(paper);
      const demos = { 'pca-shlens': demoPCA, 'ica-shlens': demoICA, 'cca-uurtio': demoCCA, 'ksparse': demoSAE, 'align-unif': demoHypersphere, 'deepsets': demoSetAgg, 'superposition': demoSuperposition };
      if (demos[paper.id]) mountDemo(demos[paper.id]);
      if (paper.id === 'superposition') requestAnimationFrame(() => mountSuperpositionCharts());
    };

    // Init
    if (!currentPaperId) {
      const level = getLevel(currentLevel);
      if (level?.papers?.length) currentPaperId = null;
    }
    state.currentLevel = currentLevel;
    render();
  </script>
</body>
