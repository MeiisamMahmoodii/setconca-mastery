<!DOCTYPE html>
<html lang="en" data-fontsize="md">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>SetConCA Mastery — Research Apprenticeship</title>
  <meta name="description" content="A concept-driven interactive textbook teaching representation learning, sparse autoencoders, multi-view learning, and SetConCA research from first principles." />

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500;600&family=Inter:wght@300;400;500;600;700&family=Outfit:wght@500;600;700;800&display=swap" rel="stylesheet" />

  <!-- KaTeX -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css" />
  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"></script>

  <!-- Styles -->
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="layout" id="app">
    <!-- ── Sidebar ─────────────────────────────────────────── -->
    <aside class="sidebar" id="sidebar" role="navigation" aria-label="Course navigation">
      <!-- Logo -->
      <div>
        <div class="sidebar-logo">SetConCA Mastery</div>
        <div class="sidebar-tagline">Research Apprenticeship</div>
      </div>

      <!-- Primary CTA -->
      <button class="btn-continue" id="btnContinue" onclick="app.continueLearning()" aria-label="Continue to current lesson">
        <span class="cta-label">Continue learning</span>
        <span id="continueLabel">Loading…</span>
      </button>

      <!-- Mode toggle -->
      <div class="mode-toggle" role="group" aria-label="Learning mode">
        <button class="mode-btn active" id="modeLearn" onclick="app.setMode('learning')" aria-pressed="true">📖 Learning</button>
        <button class="mode-btn" id="modeResearch" onclick="app.setMode('research')" aria-pressed="false">🔬 Research</button>
      </div>

      <!-- Progress -->
      <div class="progress-card">
        <div class="progress-row">
          <span>Course Progress</span>
          <strong id="pctText">0%</strong>
        </div>
        <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
        <div class="progress-row" style="margin-top:0.4rem">
          <span id="lessonsStats">0/0 lessons</span>
          <span id="masteredStats">0 mastered</span>
        </div>
      </div>

      <!-- Review reminder -->
      <div class="review-badge hidden" id="reviewBadge">
        ⏰ <strong id="reviewCount">0</strong> concepts due for review
      </div>

      <!-- Phase navigation -->
      <div class="nav-section-label">Phases</div>
      <div id="phaseNav"></div>

      <!-- Utility links -->
      <div class="sidebar-nav-links">
        <button class="sidebar-link" onclick="app.navigate('/map')" aria-label="Open concept map">
          🗺️ Concept Map
        </button>
        <button class="sidebar-link" onclick="app.navigate('/library')" aria-label="Open research library">
          📚 Research Library
        </button>
        <button class="sidebar-link" onclick="app.navigate('/glossary')" aria-label="Open glossary">
          📖 Glossary
        </button>
        <button class="sidebar-link" onclick="app.navigate('/search')" aria-label="Search">
          🔍 Search
        </button>

        <!-- Font size controls -->
        <div style="display:flex; gap:0.35rem; margin-top:0.3rem">
          <button class="btn-icon" onclick="app.setFontSize('sm')" title="Small text" aria-label="Small font">A−</button>
          <button class="btn-icon" onclick="app.setFontSize('md')" title="Normal text" aria-label="Normal font">A</button>
          <button class="btn-icon" onclick="app.setFontSize('lg')" title="Large text" aria-label="Large font">A+</button>
          <button class="btn-icon" onclick="app.exportProgress()" title="Export progress" aria-label="Export progress">↓</button>
        </div>

        <button class="sidebar-link" style="color:var(--dim); font-size:0.72rem; margin-top:0.25rem" onclick="app.resetProgress()">
          Reset Progress
        </button>
      </div>
    </aside>

    <!-- ── Main content ────────────────────────────────────── -->
    <main id="main" class="main-content" role="main" aria-live="polite">
      <div style="text-align:center; padding:4rem 2rem; color:var(--muted)">
        <div style="font-size:2rem; margin-bottom:1rem">⚙️</div>
        Loading curriculum…
      </div>
    </main>
  </div>

  <!-- Glossary tooltip (global) -->
  <div id="glTooltip" style="display:none; position:fixed; z-index:1000; background:var(--surface); border:1px solid var(--border-accent); border-radius:8px; padding:0.6rem 0.85rem; font-size:0.8rem; max-width:260px; pointer-events:none; box-shadow:0 8px 24px rgba(0,0,0,0.5);"></div>

  <!-- Map tooltip -->
  <div class="map-tooltip" id="mapTooltip"></div>

  <!-- App modules -->
  <script type="module">
    import { createApp } from './app.js?v=20260723';
    window.app = createApp();
    window.app.init();

    // KaTeX auto-render when DOM updates
    function renderMath() {
      if (typeof renderMathInElement !== 'undefined') {
        renderMathInElement(document.getElementById('main'), {
          delimiters: [
            { left: '$$', right: '$$', display: true },
            { left: '\\[', right: '\\]', display: true },
            { left: '$', right: '$', display: false },
            { left: '\\(', right: '\\)', display: false }
          ],
          throwOnError: false,
          errorColor: '#f43f5e'
        });
      }
    }

    // Re-render math after every navigation
    const observer = new MutationObserver(() => {
      renderMath();
    });
    observer.observe(document.getElementById('main'), { childList: true, subtree: false });

    // Handle browser back/forward
    window.addEventListener('popstate', () => app.handleRoute());

    // Hash-based routing
    window.addEventListener('hashchange', () => app.handleRoute());
  </script>
</body>
</html>
