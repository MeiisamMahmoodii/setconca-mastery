<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>SetConCA Mastery — Self-contained Course</title>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg:#0f1117; --surface:#171b26; --surface2:#1e2433; --border:#2a3144;
      --text:#e8ecf4; --muted:#8b95a8; --accent:#6c9eff; --ok:#7ee787; --warn:#f0b060; --bad:#f07178;
      --font:'IBM Plex Sans',system-ui,sans-serif; --mono:'IBM Plex Mono',monospace;
    }
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:var(--font);background:var(--bg);color:var(--text);line-height:1.55;min-height:100vh}
    button{font-family:inherit;cursor:pointer;border:none;border-radius:8px;padding:.55rem 1rem;font-weight:500}
    .btn-primary{background:var(--accent);color:#0a0e18}
    .btn-secondary{background:var(--surface2);color:var(--text);border:1px solid var(--border)}
    .btn-ghost{background:transparent;color:var(--muted);border:1px solid var(--border)}
    .layout{display:grid;grid-template-columns:280px 1fr;min-height:100vh}
    .sidebar{background:var(--surface);border-right:1px solid var(--border);padding:1.1rem;overflow-y:auto;position:sticky;top:0;height:100vh}
    .sidebar h1{font-size:1.05rem;margin-bottom:.25rem}
    .sub{font-size:.78rem;color:var(--muted);margin-bottom:.9rem}
    .progress-bar{height:6px;background:var(--surface2);border-radius:99px;overflow:hidden}
    .progress-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--ok));width:0;transition:width .3s}
    .progress-label{font-size:.75rem;color:var(--muted);margin:.35rem 0 1rem}
    .level-nav{list-style:none}
    .level-nav button{width:100%;text-align:left;background:transparent;color:var(--muted);padding:.45rem .6rem;border-radius:8px;font-size:.8rem;border:1px solid transparent;display:flex;gap:.45rem;align-items:center}
    .level-nav button.active{background:var(--surface2);color:var(--text);border-color:var(--border)}
    .dot{width:8px;height:8px;border-radius:50%;background:var(--border);flex-shrink:0}
    .level-nav button.done .dot{background:var(--ok)}
    main{padding:1.4rem 1.8rem 3rem;max-width:900px}
    .badge{display:inline-block;font-size:.68rem;font-weight:600;text-transform:uppercase;letter-spacing:.04em;padding:.15rem .45rem;border-radius:4px;background:var(--surface2);color:var(--muted);margin-right:.3rem}
    .badge.accent{background:rgba(108,158,255,.15);color:var(--accent)}
    .badge.ok{background:rgba(126,231,135,.15);color:var(--ok)}
    h2{font-size:1.55rem;margin:.4rem 0 .6rem}
    h3{font-size:1.05rem;margin:0 0 .7rem}
    h4{font-size:.92rem;margin:1rem 0 .45rem;color:var(--accent)}
    .card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:1.15rem;margin-bottom:1rem}
    .callout{border-left:3px solid var(--accent);padding:.7rem 1rem;background:rgba(108,158,255,.06);border-radius:0 8px 8px 0;margin:.8rem 0;font-size:.9rem}
    .callout.ok{border-color:var(--ok);background:rgba(126,231,135,.06)}
    .callout.warn{border-color:var(--warn);background:rgba(240,176,96,.06)}
    .callout.bad{border-color:var(--bad);background:rgba(240,113,120,.06)}
    .formula{font-family:var(--mono);font-size:.84rem;background:var(--surface2);border:1px solid var(--border);padding:.65rem .85rem;border-radius:8px;color:var(--ok);margin:.5rem 0}
    .learn-list{list-style:none}
    .learn-list li{padding:.3rem 0 .3rem 1.15rem;position:relative;font-size:.9rem}
    .learn-list li::before{content:'→';position:absolute;left:0;color:var(--accent)}
    .paper-item,.toc-item{display:flex;justify-content:space-between;align-items:center;gap:.75rem;padding:.7rem .9rem;background:var(--surface2);border:1px solid var(--border);border-radius:8px;cursor:pointer;margin-bottom:.45rem;font-size:.9rem}
    .paper-item:hover,.toc-item:hover{border-color:var(--accent)}
    .tabs{display:flex;gap:.4rem;flex-wrap:wrap;margin-bottom:1rem}
    .tab{padding:.4rem .85rem;border-radius:99px;font-size:.8rem;background:var(--surface2);color:var(--muted);border:1px solid var(--border)}
    .tab.active{background:rgba(108,158,255,.15);color:var(--accent);border-color:var(--accent)}
    .checkrow{display:flex;gap:.6rem;align-items:flex-start;margin:.35rem 0;font-size:.9rem}
    .checkrow input{margin-top:.25rem}
    .quiz-opt{display:block;width:100%;text-align:left;padding:.55rem .8rem;margin:.35rem 0;background:var(--surface2);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:.88rem}
    .quiz-opt.correct{border-color:var(--ok);background:rgba(126,231,135,.1)}
    .quiz-opt.wrong{border-color:var(--bad);background:rgba(240,113,120,.1)}
    .vocab{display:grid;gap:.5rem}
    .vocab div{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:.65rem .8rem;font-size:.88rem}
    .vocab strong{color:var(--accent)}
    .two-col{display:grid;grid-template-columns:1fr 1fr;gap:.75rem}
    @media(max-width:850px){.layout{grid-template-columns:1fr}.sidebar{position:relative;height:auto}.two-col{grid-template-columns:1fr}}
    .actions{display:flex;gap:.5rem;flex-wrap:wrap;margin-top:1rem}
    .demo-canvas{width:100%;background:#0a0e14;border:1px solid var(--border);border-radius:8px;display:block}
    .demo-controls{display:flex;gap:.5rem;flex-wrap:wrap;margin-top:.5rem;align-items:center;font-size:.8rem;color:var(--muted)}
    .demo-controls input[type=range]{width:120px;accent-color:var(--accent)}
    .muted{color:var(--muted);font-size:.88rem}
    .prose p{margin:.55rem 0;white-space:pre-wrap}
    table{width:100%;border-collapse:collapse;font-size:.82rem}
    th,td{padding:.5rem .65rem;border:1px solid var(--border);text-align:left}
    th{background:var(--surface2);color:var(--muted)}
    .dual{display:grid;grid-template-columns:1fr 1fr;gap:.65rem;margin-top:.55rem}
    @media(max-width:850px){.dual{grid-template-columns:1fr}}
    .dual .orig{border-left:3px solid var(--accent);background:rgba(108,158,255,.06);padding:.7rem .85rem;border-radius:0 8px 8px 0;font-size:.88rem}
    .dual .simp{border-left:3px solid var(--ok);background:rgba(126,231,135,.06);padding:.7rem .85rem;border-radius:0 8px 8px 0;font-size:.88rem}
    .dual .lbl{font-size:.68rem;font-weight:700;text-transform:uppercase;letter-spacing:.04em;margin-bottom:.35rem;opacity:.9}
    .dual .orig .lbl{color:var(--accent)}
    .dual .simp .lbl{color:var(--ok)}
    .idea-card{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:1rem;margin-bottom:.75rem}
    .idea-card h4{margin:0 0 .5rem;font-size:.95rem;color:var(--text)}
    .hidden{display:none!important}
    </style>
</head>
<body>
  <div class="layout">
    <aside class="sidebar">
      <h1>SetConCA Mastery</h1>
      <p class="sub">Self-contained course · no PDF required</p>
      <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
      <div class="progress-label" id="progressLabel">0%</div>
      <button class="btn-ghost" style="width:100%;font-size:.78rem;margin-bottom:.8rem" onclick="showHome()">Course home</button>
      <ul class="level-nav" id="levelNav"></ul>
      <button class="btn-ghost" style="width:100%;font-size:.78rem;margin-top:1rem" onclick="resetProgress()">Reset progress</button>
    </aside>
    <main id="main"></main>
  </div>
  <script src="papers.js"></script>
  <script>
    const KEY = 'setconca-course-v2';
    let state = load();
    let view = state.view || {type:'home'};

    function load(){ try{return JSON.parse(localStorage.getItem(KEY))||def()}catch{return def()} }
    function def(){ return {view:{type:'home'}, primers:{}, papers:{}, checks:{}, notes:{}} }
    function save(){ localStorage.setItem(KEY, JSON.stringify(state)); renderSidebar(); }

    function allPaperIds(){ return CURRICULUM_DATA.levels.flatMap(l=>l.papers.map(p=>p.id)); }
    function getPaper(id){ return CURRICULUM_DATA.levels.flatMap(l=>l.papers).find(p=>p.id===id); }
    function getLevel(id){ return CURRICULUM_DATA.levels.find(l=>l.id===id); }
    function paperDone(id){ const p=state.papers[id]||{}; return !!(p.learn && p.quiz); }
    function primerDone(id){ return !!state.primers[id]; }

    function progressStats(){
      const primers = CURRICULUM_DATA.levels.length;
      const papers = allPaperIds().length;
      const pd = CURRICULUM_DATA.levels.filter(l=>primerDone(l.id)).length;
      const pp = allPaperIds().filter(paperDone).length;
      const total = primers + papers;
      const done = pd + pp;
      return {done,total,pct: Math.round(100*done/total), pd, primers, pp, papers};
    }

    function renderSidebar(){
      const s = progressStats();
      document.getElementById('progressFill').style.width = s.pct+'%';
      document.getElementById('progressLabel').textContent = `${s.pct}% · ${s.pp}/${s.papers} papers · ${s.pd}/${s.primers} primers`;
      document.getElementById('levelNav').innerHTML = CURRICULUM_DATA.levels.map(l=>{
        const papers=l.papers.filter(p=>!p.optional);
        const done = primerDone(l.id) && papers.every(p=>paperDone(p.id));
        const active = view.type!=='home' && (view.levelId===l.id || (view.paperId && getLevel(CURRICULUM_DATA.levels.find(x=>x.papers.some(p=>p.id===view.paperId))?.id)?.id===l.id));
        const lvl = view.paperId ? CURRICULUM_DATA.levels.find(x=>x.papers.some(p=>p.id===view.paperId)) : null;
        const isActive = view.levelId===l.id || (lvl && lvl.id===l.id);
        return `<li><button class="${isActive?'active':''} ${done?'done':''}" onclick="openLevel(${l.id})"><span class="dot"></span>L${l.id}: ${l.title}</button></li>`;
      }).join('');
    }

    function showHome(){ view={type:'home'}; state.view=view; save(); render(); }
    function openLevel(id){ view={type:'level', levelId:id}; state.view=view; save(); render(); }
    function openPaper(id){ view={type:'paper', paperId:id, section:'learn'}; state.view=view; save(); render(); }
    function resetProgress(){ if(confirm('Clear all course progress?')){ state=def(); save(); render(); } }

    function render(){
      renderSidebar();
      const main=document.getElementById('main');
      if(view.type==='home') main.innerHTML = renderHome();
      else if(view.type==='level') main.innerHTML = renderLevel(view.levelId);
      else if(view.type==='paper') main.innerHTML = renderPaper(view.paperId, view.section||'learn');
    }

    function renderHome(){
      const intro = CURRICULUM_DATA.courseIntro || {};
      return `
        <span class="badge accent">Start here</span>
        <h2>${intro.title||'SetConCA Mastery'}</h2>
        <p class="muted">${intro.promise||''}</p>
        <div class="formula">${intro.formula||CURRICULUM_DATA.formula}</div>
        <div class="card"><h3>How to use this course</h3>
          <ul class="learn-list">${(intro.howToUse||[]).map(x=>`<li>${x}</li>`).join('')}</ul>
          <p class="muted" style="margin-top:.7rem">${intro.pathMap||''}</p>
        </div>
        <div class="card"><h3>Your path (10 levels)</h3>
          ${CURRICULUM_DATA.levels.map(l=>`
            <div class="toc-item" onclick="openLevel(${l.id})">
              <span><strong>L${l.id}</strong> · ${l.title} ${primerDone(l.id)?'<span class="badge ok">primer ✓</span>':''}</span>
              <span class="muted">${l.papers.filter(p=>paperDone(p.id)).length}/${l.papers.length}</span>
            </div>`).join('')}
        </div>
        <div class="actions"><button class="btn-primary" onclick="openLevel(1)">Begin Level 1 →</button></div>`;
    }

    function renderLevel(id){
      const level = getLevel(id);
      const primer = (CURRICULUM_DATA.levelPrimers||{})[String(id)] || level.primer || {};
      return `
        <button class="btn-ghost" onclick="showHome()">← Course home</button>
        <div style="margin-top:.8rem">
          <span class="badge accent">Level ${id}</span>
          <span class="badge">Weeks ${level.weeks||''}</span>
          ${primerDone(id)?'<span class="badge ok">Primer done</span>':''}
        </div>
        <h2>${level.title}</h2>
        <p class="muted"><strong>Mission:</strong> ${primer.mission||''}</p>
        <p class="muted"><strong>Before you start:</strong> ${primer.beforeYouStart||''}</p>

        <div class="card">
          <h3>Level primer (read this first)</h3>
          <div class="prose">${(primer.primer||'').split(/\n\n+/).map(p=>`<p>${esc(p)}</p>`).join('')}</div>
          ${(primer.bigPictureDiagram||[]).length?`<h4>Big picture</h4><div class="formula">${primer.bigPictureDiagram.map(esc).join('<br>')}</div>`:''}
          ${(primer.conceptsToMaster||[]).length?`<h4>Concepts to master</h4>${primer.conceptsToMaster.map(c=>`<div class="idea-card"><h4>${esc(c.name)}</h4><div class="dual"><div class="orig"><div class="lbl">Original idea</div>${esc(c.deeper||c.simple)}</div><div class="simp"><div class="lbl">Simple explanation</div>${esc(c.simple)}</div></div></div>`).join('')}`:''}
          <div class="actions">
            <button class="btn-primary" onclick="markPrimer(${id})">${primerDone(id)?'Primer marked done ✓':'Mark primer complete'}</button>
          </div>
        </div>

        ${level.id===6?renderMetricTable():''}
        ${primer.checkpoint?`<div class="card"><h3>Practical checkpoint</h3>
          <p><strong>Goal:</strong> ${primer.checkpoint.goal}</p>
          <ul class="learn-list">${(primer.checkpoint.steps||[]).map(s=>`<li>${s}</li>`).join('')}</ul>
          <p class="muted"><strong>Success looks like:</strong> ${primer.checkpoint.successLooksLike||''}</p>
        </div>`:''}

        ${(level.questions||[]).length?`<div class="card"><h3>You should be able to answer</h3><ul class="learn-list">${level.questions.map(q=>`<li>${q}</li>`).join('')}</ul></div>`:''}

        <div class="card"><h3>Modules in this level</h3>
          ${level.papers.map(p=>`
            <div class="paper-item" onclick="openPaper('${p.id}')">
              <span>${p.num?`#${p.num} `:''}${p.title}${p.optional?' <span class="badge">optional</span>':''}</span>
              <span class="muted">${paperDone(p.id)?'✓ done':'study →'}</span>
            </div>`).join('')}
        </div>
        <p class="muted">${primer.bridgeToNext||''}</p>
        <div class="actions">
          ${id>1?`<button class="btn-secondary" onclick="openLevel(${id-1})">← Level ${id-1}</button>`:''}
          ${id<10?`<button class="btn-primary" onclick="openLevel(${id+1})">Level ${id+1} →</button>`:''}
        </div>`;
    }

    function renderMetricTable(){
      const rows=(CURRICULUM_DATA.metricTable||[]).map(r=>`<tr><td>${r[0]}</td><td>${r[1]}</td><td>${r[2]}</td></tr>`).join('');
      return `<div class="card"><h3>What each test establishes</h3>
        <table><thead><tr><th>Test</th><th>Supports</th><th>Does NOT establish</th></tr></thead><tbody>${rows}</tbody></table>
        <p class="muted" style="margin-top:.5rem">Memorise this table. No single metric = interpretability.</p></div>`;
    }

    function markPrimer(id){ state.primers[id]=true; save(); render(); }

    function renderPaper(id, section){
      const paper=getPaper(id);
      const level=CURRICULUM_DATA.levels.find(l=>l.papers.some(p=>p.id===id));
      const t=paper.teach||{};
      const sections=[
        ['learn','Learn'],
        ['ideas','Key ideas'],
        ['math','Math'],
        ['limits','Shows / not'],
        ['apply','SetConCA'],
        ['check','Mastery'],
        ['quiz','Quiz'],
      ];
      if(hasDemo(id)) sections.splice(2,0,['demo','Interactive']);
      if(paper.id==='superposition' && paper.richContent) sections.splice(2,0,['charts','Charts']);

      return `
        <button class="btn-ghost" id="backBtn" onclick="openLevel(${level.id})">← Back to Level ${level.id}</button>
        <div style="margin-top:.8rem">
          <span class="badge accent">${paper.num?`Paper ${paper.num}`:'Optional'}</span>
          ${paperDone(id)?'<span class="badge ok">Module complete</span>':''}
        </div>
        <h2>${paper.title}</h2>
        <p class="muted">${paper.authors||''}${paper.pages?` · ${paper.pages} pages (reference only)`:''}</p>
        <div class="callout ok"><strong>Why we read this:</strong> ${t.whyWeRead||paper.setconca||''}</div>
        <p><em>${t.oneSentence||''}</em></p>

        <div class="tabs">
          ${sections.map(([k,lab])=>`<button class="tab ${section===k?'active':''}" onclick="setSection('${k}')">${lab}</button>`).join('')}
        </div>
        <div id="sectionBody">${renderSection(paper, section)}</div>
        <div class="actions">
          ${paper.pdfPath?`<a href="${paper.pdfPath}" target="_blank"><button class="btn-secondary">Optional PDF</button></a>`:''}
          ${paper.url?`<a href="${paper.url}" target="_blank"><button class="btn-secondary">Online source</button></a>`:''}
          <button class="btn-secondary" onclick="speakTeach()">Listen</button>
          <button class="btn-primary" onclick="markLearn('${id}')">Mark learning complete</button>
        </div>`;
    }

    function setSection(s){ view.section=s; state.view=view; save(); render(); }

    function dualBlock(original, simple){
      return `<div class="dual">
        <div class="orig"><div class="lbl">Original idea</div>${esc(original||'')}</div>
        <div class="simp"><div class="lbl">Simple explanation</div>${esc(simple||'')}</div>
      </div>`;
    }

    function renderSection(paper, section){
      const t=paper.teach||{};
      if(section==='learn'){
        return `<div class="card"><h3>Core claim</h3>
          ${dualBlock(t.originalIdea||t.oneSentence, (t.simpleLesson||t.plainLanguage||'').split(/\n\n+/)[0]||t.oneSentence)}
          <h4 style="margin-top:1.1rem">Full lesson (simple walkthrough)</h4>
          <div class="prose">${(t.plainLanguage||'Content loading…').split(/\n\n+/).map(p=>`<p>${esc(p)}</p>`).join('')}</div>
          <h4>Vocabulary</h4>
          ${(t.vocabulary||[]).map(v=>`<div class="idea-card"><h4>${esc(v.term)}</h4>${dualBlock(v.original||('Technical term: '+v.term), v.simple||v.def)}</div>`).join('')||'<p class="muted">—</p>'}
          ${(t.commonConfusions||[]).length?`<h4>Common confusions</h4>${t.commonConfusions.map(c=>`<div class="callout bad"><strong>Wrong:</strong> ${esc(c.wrong)}<br><strong>Right:</strong> ${esc(c.right)}</div>`).join('')}`:''}
        </div>`;
      }
      if(section==='ideas'){
        return `<div class="card"><h3>Key ideas — original + simple</h3>
          <p class="muted" style="margin-bottom:.8rem">Left = how the paper/field states it. Right = beginner explanation. You need both.</p>
          ${(t.keyIdeas||[]).map((k,i)=>`<div class="idea-card"><h4>${i+1}. ${esc(k.title)}</h4>${dualBlock(k.original||k.explain, k.simple||k.explain)}</div>`).join('')||'<p class="muted">—</p>'}
        </div>`;
      }
      if(section==='math'){
        if(!(t.simplifiedMath||[]).length) return `<div class="card"><p class="muted">This module is mostly conceptual — no required formulas beyond vocabulary.</p></div>`;
        return `<div class="card"><h3>Math — formula + meaning</h3>
          ${t.simplifiedMath.map(m=>`<div class="idea-card"><h4>${esc(m.name)}</h4>
            <div class="formula">${esc(m.formula)}</div>
            ${dualBlock(m.original||m.formula, m.simple||m.meaning)}
          </div>`).join('')}
        </div>`;
      }
      if(section==='limits'){
        const shows=(t.limitPairs&&t.limitPairs.length)?t.limitPairs:(t.whatItShows||[]).map(s=>({original:s,simple:'Evidence supports this — nothing more.'}));
        const nots=(t.nonClaimPairs&&t.nonClaimPairs.length)?t.nonClaimPairs:(t.whatItDoesNotShow||[]).map(s=>({original:s,simple:'Do not stretch the paper into this claim.'}));
        return `<div class="card"><h3>What the results support</h3>
          ${shows.map((x,i)=>`<div class="idea-card"><h4>Shows ${i+1}</h4>${dualBlock(x.original,x.simple)}</div>`).join('')}
          <h3 style="margin-top:1rem">What they do not establish</h3>
          ${nots.map((x,i)=>`<div class="idea-card"><h4>Not shown ${i+1}</h4>${dualBlock(x.original,x.simple)}</div>`).join('')}
        </div>`;
      }
      if(section==='apply'){
        const pairs=(t.setconcaPairs&&t.setconcaPairs.length)?t.setconcaPairs:(t.setconcaUse||[paper.setconca]).map(u=>({original:u,simple:u}));
        return `<div class="card"><h3>SetConCA — claim vs action</h3>
          ${pairs.map((x,i)=>`<div class="idea-card"><h4>Use ${i+1}</h4>${dualBlock(x.original,x.simple)}</div>`).join('')}
          <div class="callout ok">${esc(paper.setconca||'')}</div>
        </div>`;
      }
      if(section==='check'){
        const checks=t.masteryChecklist||[];
        const st=state.checks[paper.id]||{};
        return `<div class="card"><h3>Mastery checklist</h3>
          <p class="muted">Check each item only when you can state both the original idea and a simple explanation without looking.</p>
          ${checks.map((c,i)=>`<label class="checkrow"><input type="checkbox" ${st[i]?'checked':''} onchange="toggleCheck('${paper.id}',${i},this.checked)"/><span>${esc(c)}</span></label>`).join('')}
        </div>`;
      }
      if(section==='quiz'){
        const quiz=paper.quiz||t.quiz||[];
        return `<div class="card"><h3>Quiz</h3>
          ${quiz.map((q,i)=>`<div style="margin-bottom:1.1rem">
            <div style="font-weight:500;margin-bottom:.4rem">${i+1}. ${esc(q.q)}</div>
            ${(q.options||[]).map((o,j)=>`<button class="quiz-opt" onclick="answer('${paper.id}',${i},${j},${q.a},this)">${esc(o)}</button>`).join('')}
            <div class="muted hidden" id="qf-${paper.id}-${i}" style="margin-top:.4rem"></div>
          </div>`).join('')||'<p class="muted">No quiz.</p>'}
          <button class="btn-primary" onclick="markQuiz('${paper.id}')">Mark quiz complete</button>
        </div>`;
      }
      if(section==='demo') return `<div class="card"><h3>Interactive demo</h3><div id="demoMount"></div></div>`;
      if(section==='charts') return renderSuperCharts(paper);
      return '';
    }

    function esc(s){ return String(s??'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

    function toggleCheck(pid,i,v){ state.checks[pid]=state.checks[pid]||{}; state.checks[pid][i]=v; save(); }
    function markLearn(id){ state.papers[id]=state.papers[id]||{}; state.papers[id].learn=true; save(); render(); }
    function markQuiz(id){ state.papers[id]=state.papers[id]||{}; state.papers[id].quiz=true; save(); render(); }

    function answer(pid,qi,chosen,correct,btn){
      const box=btn.parentElement;
      box.querySelectorAll('.quiz-opt').forEach((b,j)=>{ b.disabled=true; if(j===correct)b.classList.add('correct'); else if(j===chosen)b.classList.add('wrong'); });
      const paper=getPaper(pid); const q=(paper.quiz||paper.teach?.quiz||[])[qi];
      const fb=document.getElementById(`qf-${pid}-${qi}`);
      fb.classList.remove('hidden');
      fb.textContent=(chosen===correct?'✓ ':'✗ ')+(q?.explain||'');
    }

    function speakTeach(){
      const p=getPaper(view.paperId); const t=p.teach||{};
      const u=new SpeechSynthesisUtterance(`${p.title}. ${t.whyWeRead||''}. ${t.oneSentence||''}`);
      u.rate=.95; speechSynthesis.speak(u);
    }

    function hasDemo(id){ return ['pca-shlens','ica-shlens','cca-uurtio','ksparse','align-unif','deepsets','superposition'].includes(id); }

    // demos (simplified)
    function mountDemos(){
      if(view.type!=='paper'||view.section!=='demo') return;
      const m=document.getElementById('demoMount'); if(!m) return;
      const id=view.paperId;
      if(id==='pca-shlens') demoPCA(m);
      else if(id==='ica-shlens') demoICA(m);
      else if(id==='cca-uurtio') demoCCA(m);
      else if(id==='ksparse') demoSAE(m);
      else if(id==='align-unif') demoAlign(m);
      else if(id==='deepsets') demoSet(m);
      else if(id==='superposition') demoSuper(m);
    }

    function demoPCA(mount){
      mount.innerHTML=`<canvas class="demo-canvas" id="c" width="440" height="260"></canvas>
        <div class="demo-controls"><label>Components <input type="range" id="k" min="1" max="2" value="1"></label></div>
        <p class="muted">Green=data, blue=reconstruction. Dropping components increases error (FVU↑).</p>`;
      const canvas=document.getElementById('c'), ctx=canvas.getContext('2d');
      let pts=Array.from({length:14},()=>({x:70+Math.random()*300,y:40+Math.random()*180}));
      function draw(){
        const k=+document.getElementById('k').value;
        ctx.fillStyle='#0a0e14'; ctx.fillRect(0,0,440,260);
        const mx=pts.reduce((s,p)=>s+p.x,0)/pts.length, my=pts.reduce((s,p)=>s+p.y,0)/pts.length;
        let cxx=0,cyy=0,cxy=0; pts.forEach(p=>{const dx=p.x-mx,dy=p.y-my;cxx+=dx*dx;cyy+=dy*dy;cxy+=dx*dy});
        cxx/=pts.length;cyy/=pts.length;cxy/=pts.length;
        const tr=cxx+cyy,det=cxx*cyy-cxy*cxy,l1=(tr+Math.sqrt(tr*tr-4*det))/2;
        let vx=cxy,vy=l1-cxx; const n=Math.hypot(vx,vy)||1; vx/=n;vy/=n;
        ctx.strokeStyle='#6c9eff'; ctx.beginPath(); ctx.moveTo(mx-90*vx,my-90*vy); ctx.lineTo(mx+90*vx,my+90*vy); ctx.stroke();
        pts.forEach(p=>{
          let rx=p.x,ry=p.y; if(k===1){const proj=(p.x-mx)*vx+(p.y-my)*vy; rx=mx+proj*vx; ry=my+proj*vy;}
          ctx.fillStyle='#7ee787'; ctx.beginPath(); ctx.arc(p.x,p.y,4,0,7); ctx.fill();
          ctx.strokeStyle='#f07178'; ctx.beginPath(); ctx.moveTo(p.x,p.y); ctx.lineTo(rx,ry); ctx.stroke();
          ctx.fillStyle='#6c9eff'; ctx.beginPath(); ctx.arc(rx,ry,3,0,7); ctx.fill();
        });
      }
      document.getElementById('k').oninput=draw; draw();
    }
    function demoICA(mount){
      mount.innerHTML=`<canvas class="demo-canvas" id="c" width="440" height="240"></canvas>
        <div class="demo-controls"><label>Mixing <input id="a" type="range" min="0" max="90" value="35"></label></div>
        <p class="muted">Left: independent sources. Right: mixed observations. ICA seeks a rotation back to independence.</p>`;
      const ctx=document.getElementById('c').getContext('2d');
      function draw(){
        const ang=document.getElementById('a').value*Math.PI/180;
        ctx.fillStyle='#0a0e14'; ctx.fillRect(0,0,440,240);
        for(let i=0;i<10;i++){
          const t=i/10*Math.PI*2, sx=Math.cos(t)*45, sy=Math.sin(t)*16;
          const mx=sx*Math.cos(ang)+sy*Math.sin(ang), my=-sx*Math.sin(ang)+sy*Math.cos(ang);
          ctx.fillStyle='#7ee787'; ctx.fillRect(110+sx,120+sy,5,5);
          ctx.fillStyle='#6c9eff'; ctx.fillRect(300+mx,120+my,5,5);
        }
        ctx.fillStyle='#8b95a8'; ctx.font='12px IBM Plex Mono'; ctx.fillText('sources',80,30); ctx.fillText('mixed',290,30);
      }
      document.getElementById('a').oninput=draw; draw();
    }
    function demoCCA(mount){
      mount.innerHTML=`<canvas class="demo-canvas" id="c" width="440" height="220"></canvas>
        <p class="muted">Blue view A, orange view B. Lines = paired samples. CCA finds projections that maximise correlation.</p>`;
      const ctx=document.getElementById('c').getContext('2d');
      ctx.fillStyle='#0a0e14'; ctx.fillRect(0,0,440,220);
      for(let i=0;i<18;i++){
        const t=Math.random()*6, a=60+t*14+Math.random()*15, b=260+t*12+Math.random()*20;
        const ya=150-Math.sin(t)*35, yb=150-Math.sin(t)*30+Math.random()*8;
        ctx.fillStyle='#6c9eff'; ctx.beginPath(); ctx.arc(a,ya,3,0,7); ctx.fill();
        ctx.fillStyle='#f0b060'; ctx.beginPath(); ctx.arc(b,yb,3,0,7); ctx.fill();
        ctx.strokeStyle='rgba(126,231,135,.25)'; ctx.beginPath(); ctx.moveTo(a,ya); ctx.lineTo(b,yb); ctx.stroke();
      }
    }
    function demoSAE(mount){
      mount.innerHTML=`<p class="muted">Dense input → overcomplete encoder → TopK keeps k features → decoder reconstructs.</p>
        <div class="formula">z = TopK(enc(x), k) ··· x̂ = dec(z) ··· L = ||x−x̂||²</div>
        <div class="callout">Without sparsity, overcomplete codes need not specialise. TopK forces specialisation.</div>`;
    }
    function demoAlign(mount){
      mount.innerHTML=`<canvas class="demo-canvas" id="c" width="440" height="240"></canvas>
        <div class="demo-controls"><label>Alignment <input id="aw" type="range" min="0" max="100" value="70"></label>
        <label>Uniformity <input id="uw" type="range" min="0" max="100" value="55"></label></div>`;
      const ctx=document.getElementById('c').getContext('2d');
      function draw(){
        const aw=+document.getElementById('aw').value/100, uw=+document.getElementById('uw').value/100;
        ctx.fillStyle='#0a0e14'; ctx.fillRect(0,0,440,240);
        ctx.strokeStyle='#2a3144'; ctx.beginPath(); ctx.arc(220,120,85,0,7); ctx.stroke();
        [[160,90,'#6c9eff'],[280,90,'#6c9eff'],[220,170,'#f0b060']].forEach(([cx,cy,col])=>{
          for(let i=0;i<10;i++){
            const sp=(1-aw)*50+4; let x=cx+(Math.random()-.5)*sp, y=cy+(Math.random()-.5)*sp;
            x=220+(x-220)*(.45+uw*.55); y=120+(y-120)*(.45+uw*.55);
            ctx.fillStyle=col; ctx.globalAlpha=.75; ctx.beginPath(); ctx.arc(x,y,3,0,7); ctx.fill();
          }
        });
        ctx.globalAlpha=1;
      }
      document.getElementById('aw').oninput=draw; document.getElementById('uw').oninput=draw; draw();
    }
    function demoSet(mount){
      mount.innerHTML=`<div class="formula">f(X)=ρ( Σ φ(x) )</div>
        <p class="muted">Permutation invariance: order of views must not change the concept code. Mean pooling is a special case; attention helps when relations matter.</p>`;
    }
    function demoSuper(mount){
      mount.innerHTML=`<canvas class="demo-canvas" id="c" width="440" height="240"></canvas>
        <div class="demo-controls"><label>Features <input id="n" type="range" min="2" max="12" value="8"></label></div>
        <p class="muted">More features than 2D → almost-orthogonal packing = superposition → polysemantic neurons.</p>`;
      const ctx=document.getElementById('c').getContext('2d');
      function draw(){
        const n=+document.getElementById('n').value;
        ctx.fillStyle='#0a0e14'; ctx.fillRect(0,0,440,240);
        for(let f=0;f<n;f++){
          const a=f/n*Math.PI*2-Math.PI/2;
          ctx.strokeStyle=`hsl(${f*360/n},70%,60%)`; ctx.beginPath();
          ctx.moveTo(220,120); ctx.lineTo(220+Math.cos(a)*90,120+Math.sin(a)*70); ctx.stroke();
        }
        ctx.fillStyle='#f07178'; ctx.beginPath(); ctx.arc(220,120,7,0,7); ctx.fill();
      }
      document.getElementById('n').oninput=draw; draw();
    }

    function renderSuperCharts(paper){
      const r=paper.richContent;
      return `<div class="card"><h3>From Toy Models of Superposition</h3>
        <ul class="learn-list">${(r.keyResults||[]).map(x=>`<li>${esc(x)}</li>`).join('')}</ul>
        <h4>Three ways out → SAEs</h4>
        ${(r.threeWaysOut||[]).map(w=>`<div class="callout"><strong>${esc(w.approach)}</strong><br>${esc(w.desc)}<br><span class="muted">${esc(w.saes)}</span></div>`).join('')}
        <div class="formula">${esc(r.featureDimensionality?.formula||'')}</div>
        <p class="muted">${esc(r.featureDimensionality?.interpretation||'')}</p>
      </div>`;
    }

    // after render hook for demos
    const _render=render;
    render=function(){ _render(); requestAnimationFrame(mountDemos); };

    render();
  </script>
</body>
</html>
